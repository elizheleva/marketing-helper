# Deploy Marketing Helper: HubSpot (UI) + VPS (backend)
# Push to main → auto-deploy to both targets
# No localhost needed after setup

name: Deploy

on:
  push:
    branches: [main]

env:
  DEFAULT_ACCOUNT_ID: ${{ secrets.HUBSPOT_ACCOUNT_ID }}
  DEFAULT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}

jobs:
  deploy-hubspot:
    name: Deploy to HubSpot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to HubSpot
        uses: HubSpot/hubspot-project-actions@v1.1.0

  deploy-vps:
    name: Deploy to VPS (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/express-api
            git pull origin main
            cd /root
            docker compose build express-api --no-cache
            docker compose up -d express-api
